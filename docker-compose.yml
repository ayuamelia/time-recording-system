version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: time_recording_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: time_recording
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional: run the API in Docker too
  # api:
  #   build: .
  #   ports:
  #     - '3000:3000'
  #   environment:
  #     DATABASE_URL: postgresql://postgres:password@postgres:5432/time_recording
  #     APP_TIMEZONE: Asia/Singapore
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

volumes:
  pgdata:
